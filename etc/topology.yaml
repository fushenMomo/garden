# 单一数据源 -> tools/gen_config.lua -> config.* / clustername.* / start.sh / stop.sh / kill.sh
# 命名: {type}_{server_id}_{proc_id}

host: "127.0.0.1"

global:
  login:
    count: 2

ports:
  mysql: 3306
  redis:
    login: 8000
    group_base: 8001
  cluster:
    webapi: 2525
    servermgr: 2527
    worldmgr_base: 2528
    gateway_base: 2530
    world_base: 2540
    bi_base: 2544
    login_base: 2560
  tcp:
    login_base: 8888
    login_step: 10
    webapi: 8900
    gateway_base: 8889
  debug_console:
    login_base: 9000
    webapi: 9002
    servermgr: 9011
    worldmgr_base: 9021
    bi_offset: 2
    gateway_base: 9030
    world_base: 20000

groups:
  - id: 1
    gateway_count: 2
    world_count: 2
    bi: true
  - id: 2
    gateway_count: 2
    world_count: 2
    bi: true
  - id: 3
    gateway_count: 2
    world_count: 2
    bi: true

skynet:
  thread: 8
  harbor: 0
  bootstrap: "snlua bootstrap"
  lualoader: "./lualib/loader.lua"
  lua_path: "./lualib/?.lua;./lualib/?/init.lua;../?.lua"
  lua_cpath: "./luaclib/?.so"
  cpath: "./cservice/?.so"
  logger_level: "INFO"

process:
  webAPI:
    start: "webAPI_main"
    luaservice: "../webAPI/?.lua;../common/?.lua;./service/?.lua;"
    http_agent_count: 8
    http_body_limit: 65536
    http_protocol: "http"
    web_api_key: ""
  login:
    start: "login_main"
    luaservice: "../login/?.lua;../common/?.lua;./service/?.lua;"
    login_maxclient: 1024
    login_package_max: 8192
  serverMgr:
    start: "serverMgr_main"
    luaservice: "../serverMgr/?.lua;./service/?.lua;../common/?.lua"
  gateway:
    start: "gateway_main"
    luaservice: "../gateway/?.lua;../common/?.lua;./service/?.lua;"
    gateway_maxclient: 1024
    gateway_package_max: 8192
  worldMgr:
    start: "worldMgr_main"
    luaservice: "../worldMgr/?.lua;../common/?.lua;./service/?.lua;"
    guild_world_proc_id: 2
  world:
    start: "world_main"
    luaservice: "../world/?.lua;./service/?.lua;../world/service/standalone/?.lua;../common/?.lua"
    world_maxclient: 2048
  bi:
    start: "bi_main"
    luaservice: "../bi/?.lua;../common/?.lua;./service/?.lua;"

